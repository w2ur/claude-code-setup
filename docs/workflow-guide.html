          <h3 style={{fontSize:14,fontWeight:700,color:"#8B5CF6",marginBottom:12}}>Agents</h3>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {AGENTS.map((a,i)=>(<div key={i} style={{padding:"14px 18px",borderRadius:8,background:"#0F172A",border:"1px solid #1E293B"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                <code style={{fontSize:14,fontWeight:800,color:"#F8FAFC"}}>{a.name}</code>
                {pill("#8B5CF622","#8B5CF6",a.model)}
                {a.memory&&pill("#EF444422","#EF4444","memory: project")}
                {a.skills.map(s=>pill("#10B98122","#10B981","skill: "+s))}
              </div>
              <p style={{fontSize:11,color:"#94A3B8",lineHeight:1.5}}>{a.desc}</p>
            </div>))}
          </div>
        </div>
        <div>
          <h3 style={{fontSize:14,fontWeight:700,color:"#10B981",marginBottom:12}}>Skills (préchargées dans les agents)</h3>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {SKILLS.map((s,i)=>(<div key={i} style={{padding:"14px 18px",borderRadius:8,background:"#0F172A",border:"1px solid #1E293B"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                <code style={{fontSize:14,fontWeight:800,color:"#F8FAFC"}}>{s.name}</code>
                {pill("#10B98122","#10B981","agent skill")}
              </div>
              <p style={{fontSize:11,color:"#94A3B8",lineHeight:1.5,marginBottom:4}}>{s.desc}</p>
              <div style={{fontSize:10,color:"#475569"}}>Préchargée dans : {s.preloaded.map(p=><span key={p} style={{color:"#8B5CF6"}}>{p} </span>)}</div>
              <div style={{fontSize:10,color:"#475569"}}>{s.file}</div>
            </div>))}
          </div>
        </div>
      </div>)}

      {/* === HOOKS TAB === */}
      {tab==="hooks"&&(<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {HOOKS.map((h,i)=>(<div key={i} style={{padding:"14px 18px",borderRadius:8,background:"#0F172A",border:"1px solid #1E293B"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
            <code style={{fontSize:14,fontWeight:800,color:"#F8FAFC"}}>{h.name}</code>
            {pill("#F59E0B22","#F59E0B",h.event)}
            {pill("#10B98122","#10B981",h.mode)}
          </div>
          <p style={{fontSize:11,color:"#94A3B8",lineHeight:1.5}}>{h.desc}</p>
        </div>))}
        <div style={{padding:"12px 16px",borderRadius:8,background:"#1E293B",marginTop:8}}>
          <p style={{fontSize:11,color:"#64748B",lineHeight:1.6}}>Tous les hooks sont <strong style={{color:"#10B981"}}>advisory</strong> — ils affichent des warnings mais ne bloquent jamais l'exécution. Pour passer en mode strict (exit code non-zero), modifier les scripts dans <code>~/.claude/hooks/scripts/</code>.</p>
        </div>
      </div>)}

      {/* === SCENARIOS TAB === */}
      {tab==="scenarios"&&(<>
        <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
          {[{id:"all",label:"Tous",color:"#94A3B8"},...Object.entries(CATEGORIES).map(([id,c])=>({id,label:c.label,color:c.color}))].map(f=>(
            <button key={f.id} onClick={()=>{setFlt(f.id);setAid(null)}} style={{padding:"6px 14px",fontSize:11,fontWeight:600,fontFamily:F,borderRadius:6,background:flt===f.id?f.color+"22":"#1E293B",color:flt===f.id?f.color:"#64748B",border:"1px solid "+(flt===f.id?f.color+"44":"#334155"),transition:"all 0.15s"}}>{f.label}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:16,minHeight:"65vh"}}>
          <div style={{width:260,flexShrink:0,display:"flex",flexDirection:"column",gap:6}}>
            {fl.map(s=>{const ct=CATEGORIES[s.category];const on=aid===s.id;return(
              <button key={s.id} onClick={()=>setAid(on?null:s.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,border:"1px solid "+(on?ct.color+"66":"#1E293B"),background:on?ct.bg:"#0F172A",textAlign:"left",fontFamily:F,transition:"all 0.15s"}}>
                <span style={{fontSize:18,lineHeight:1,opacity:on?1:0.5}}>{s.icon}</span>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:on?"#F8FAFC":"#94A3B8"}}>{s.title}</div><div style={{fontSize:10,color:"#64748B",marginTop:2}}>{s.frequency}</div></div>
                <span style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:ct.color+"22",color:ct.color,fontWeight:600}}>{ct.label.slice(0,3).toUpperCase()}</span>
              </button>)
            })}
          </div>
          <div style={{flex:1,minWidth:0}}>
            {!ac?(<div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,border:"1px dashed #1E293B",color:"#334155",fontSize:13}}>← Sélectionne un scénario</div>):(
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{padding:"14px 18px",borderRadius:10,background:CATEGORIES[ac.category].bg,border:"1px solid "+CATEGORIES[ac.category].color+"33"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}><span style={{fontSize:22}}>{ac.icon}</span><h2 style={{fontSize:17,fontWeight:700,color:"#F8FAFC",margin:0}}>{ac.title}</h2></div>
                <p style={{fontSize:12,color:"#94A3B8",margin:0}}>{ac.when}</p>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {ac.steps.map((st,i)=>{const tc=gtc(st.tool);return(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"26px 1fr",gap:10}}>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                      <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",background:"#1E293B",border:"2px solid "+tc,fontSize:10,fontWeight:800,color:tc}}>{i+1}</div>
                      {i<ac.steps.length-1&&<div style={{width:2,flex:1,background:"#1E293B",minHeight:6}}/>}
                    </div>
                    <div style={{padding:"8px 12px",marginBottom:3,borderRadius:7,background:"#0F172A",border:"1px solid #1E293B"}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:3}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#F8FAFC"}}>{st.action}</span>
                        <code style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:tc+"18",color:tc,fontWeight:600}}>{st.tool}</code>
                      </div>
                      <p style={{fontSize:11,color:"#64748B",margin:0,lineHeight:1.4}}>{st.detail}</p>
                      <div style={{fontSize:10,color:"#475569",marginTop:3}}>{st.where}</div>
                    </div>
                  </div>)})}
              </div>
              <div style={{padding:"12px 16px",borderRadius:8,background:"#EF444410",border:"1px solid #EF444433"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#EF4444",marginBottom:6}}>⚠ Pièges courants</div>
                {ac.traps.map((t,i)=>(<div key={i} style={{fontSize:11,color:"#FCA5A5",lineHeight:1.5,paddingLeft:12,position:"relative",marginBottom:2}}><span style={{position:"absolute",left:0}}>•</span>{t}</div>))}
              </div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",padding:"8px 12px",borderRadius:6,background:"#0F172A",border:"1px solid #1E293B"}}>
                {[{l:"/command",c:"#3B82F6"},{l:"plugin",c:"#A855F7"},{l:"hook",c:"#F59E0B"},{l:"terminal",c:"#F97316"},{l:"projet Claude",c:"#64748B"},{l:"auto",c:"#10B981"}].map(x=>(
                  <div key={x.l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:"50%",background:x.c}}/><span style={{fontSize:9,color:"#64748B"}}>{x.l}</span></div>
                ))}
              </div>
            </div>)}
          </div>
        </div>
      </>)}
    </div></div>)
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
